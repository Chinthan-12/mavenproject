name: maven-prject
on: 
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: cloning maven project
        uses: actions/checkout@v7.0.0

      - name: installing java
        uses: actions/setup-java@v5.5.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: generating package for maven project
        run: mvn package
